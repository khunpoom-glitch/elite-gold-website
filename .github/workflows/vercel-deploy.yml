name: Deploy to Vercel

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Determine Vercel target
        id: target
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "deploy_args=--prod" >> "$GITHUB_OUTPUT"
          else
            echo "environment=preview" >> "$GITHUB_OUTPUT"
            echo "deploy_args=" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Vercel CLI
        run: npm install --global vercel@54.14.0

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ steps.target.outputs.environment }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build ${{ steps.target.outputs.deploy_args }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: |
          deployment_url="$(vercel deploy --prebuilt ${{ steps.target.outputs.deploy_args }} --token=${{ secrets.VERCEL_TOKEN }})"
          echo "Deployment URL: $deployment_url"
